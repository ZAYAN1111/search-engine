<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Voyager</title>

<style>

:root{
    --bg:#f5f5f5;
    --card:#ffffff;
    --text:#202124;
    --secondary:#5f6368;
    --border:#e0e0e0;
    --button:#1a73e8;
    --button-hover:#1669c1;
}

@media (prefers-color-scheme: dark){

    :root{
        --bg:#121212;
        --card:#1e1e1e;
        --text:#e8eaed;
        --secondary:#9aa0a6;
        --border:#333;
        --button:#4285f4;
        --button-hover:#5a95f5;
    }

}

body{
    margin:0;
    padding:0;
    min-height:100vh;

    background:var(--bg);
    color:var(--text);

    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

    display:flex;
    flex-direction:column;
}

header{
    background:var(--card);
    text-align:center;
    padding:2rem 1rem;

    box-shadow:0 2px 4px rgba(0,0,0,.1);
}

header h1{
    margin:0;
    font-size:2.5rem;
}

main{
    flex:1;
    max-width:900px;
    width:100%;

    margin:2rem auto;
    padding:0 1rem;
}

.search-box{
    display:flex;
    margin-bottom:1.5rem;
}

#query{
    flex:1;

    padding:.9rem 1rem;
    font-size:1.1rem;

    border:1px solid var(--border);
    border-radius:24px 0 0 24px;

    background:var(--card);
    color:var(--text);
}

#query:focus{
    outline:none;
}

button{
    border:none;

    background:var(--button);
    color:white;

    padding:0 1.5rem;

    font-size:1.1rem;

    cursor:pointer;

    border-radius:0 24px 24px 0;
}

button:hover{
    background:var(--button-hover);
}

#resultCount{
    margin-bottom:1rem;
    color:var(--secondary);
}

#results{
    list-style:none;
    padding:0;
}

#results li{
    background:var(--card);

    padding:1rem;

    margin-bottom:1rem;

    border-radius:12px;

    box-shadow:0 2px 8px rgba(0,0,0,.08);

    transition:transform .15s ease;
}

#results li:hover{
    transform:translateY(-2px);
}

.youtube-result{
    border-left:5px solid #ff0000;
}

.wikipedia-result{
    border-left:5px solid #4285f4;
}

.source-label{
    display:inline-block;

    margin-bottom:.5rem;

    font-size:.75rem;
    font-weight:bold;
    text-transform:uppercase;
}

.thumbnail{
    width:320px;
    max-width:100%;

    display:block;

    border-radius:12px;

    margin-bottom:12px;
}

.result-title{
    text-decoration:none;

    color:#4285f4;

    font-size:1.1rem;
    font-weight:600;
}

.result-title:hover{
    text-decoration:underline;
}

.snippet{
    margin-top:.5rem;
    color:var(--secondary);
}

footer{
    text-align:center;
    padding:1rem;
    color:var(--secondary);
}

</style>

</head>
<body>

<header>
    <h1>Project Voyager</h1>
</header>

<main>

```
<div class="search-box">

    <input
        id="query"
        type="text"
        placeholder="Search anything..."
        onkeydown="if(event.key==='Enter')search()"
    >

    <button onclick="search()">
        Search
    </button>

</div>

<div id="resultCount"></div>

<ul id="results"></ul>
```

</main>

<footer>
    © 2025 Zayan
</footer>

<script>

const backendURL =
    "https://search-engine-8o2m.onrender.com";

async function search(){

    const q =
        document.getElementById("query")
        .value
        .trim();

    if(!q) return;

    document.title =
        q + " - Project Voyager";

    window.history.replaceState(
        {},
        "",
        "?q=" + encodeURIComponent(q)
    );

    const list =
        document.getElementById("results");

    const count =
        document.getElementById("resultCount");

    list.innerHTML =
        "<li>Searching...</li>";

    try{

        const res =
            await fetch(
                `${backendURL}/search?q=${encodeURIComponent(q)}`
            );

        if(!res.ok){
            throw new Error(
                "HTTP " + res.status
            );
        }

        const data =
            await res.json();

        count.textContent =
            `${data.results.length} results found`;

        if(data.results.length === 0){

            list.innerHTML =
                "<li>No results found.</li>";

            return;
        }

        list.innerHTML =
            data.results.map(r => `

<li class="${
    r.source === "YouTube"
    ? "youtube-result"
    : "wikipedia-result"
}">

<span class="source-label">
${r.source}
</span>

${r.thumbnail ? `

<a href="${r.url}"
   target="_blank"
   rel="noopener noreferrer">

<img
class="thumbnail"
src="${r.thumbnail}"
alt="${r.title}"
>

</a>

` : ""}

<a
class="result-title"
href="${r.url}"
target="_blank"
rel="noopener noreferrer">

${r.title}

</a>

<div class="snippet">
${r.snippet || ""}
</div>

</li>

`).join("");

    }
    catch(err){

        count.textContent = "";

        list.innerHTML =
            `<li>Error: ${err.message}</li>`;
    }
}

const params =
    new URLSearchParams(
        window.location.search
    );

const q =
    params.get("q");

if(q){

    document
        .getElementById("query")
        .value = q;

    search();
}

</script>

</body>
</html>
